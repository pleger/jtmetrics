<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Core Pattern Interaction</title>
  <desc id="desc">Simplified interaction diagram highlighting plugin loading, topological ordering, execution, and result registration.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
      .msg { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #475569; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="600" y="38" text-anchor="middle" class="title">Core Interaction Among the Main Architectural Patterns</text>

  <rect x="70" y="70" width="180" height="56" class="box"/>
  <text x="160" y="103" text-anchor="middle" class="label">Plugin Loader</text>

  <rect x="340" y="70" width="180" height="56" class="box"/>
  <text x="430" y="103" text-anchor="middle" class="label">Metric Plugin</text>

  <rect x="610" y="70" width="190" height="56" class="box"/>
  <text x="705" y="103" text-anchor="middle" class="label">Dependency Sorter</text>

  <rect x="890" y="70" width="180" height="56" class="box"/>
  <text x="980" y="103" text-anchor="middle" class="label">Metric Executor</text>

  <rect x="1010" y="380" width="160" height="56" class="box"/>
  <text x="1090" y="413" text-anchor="middle" class="label">Result Registry</text>

  <line x1="160" y1="126" x2="160" y2="430" class="life"/>
  <line x1="430" y1="126" x2="430" y2="430" class="life"/>
  <line x1="705" y1="126" x2="705" y2="430" class="life"/>
  <line x1="980" y1="126" x2="980" y2="430" class="life"/>
  <line x1="1090" y1="436" x2="1090" y2="500" class="life"/>

  <line x1="160" y1="175" x2="430" y2="175" class="msg"/>
  <text x="295" y="165" text-anchor="middle" class="small">1. load and validate plugin</text>

  <line x1="980" y1="235" x2="705" y2="235" class="msg"/>
  <text x="842" y="225" text-anchor="middle" class="small">2. request dependency order</text>

  <line x1="705" y1="275" x2="980" y2="275" class="ret"/>
  <text x="842" y="265" text-anchor="middle" class="small">3. topological order</text>

  <line x1="980" y1="325" x2="1090" y2="325" class="msg"/>
  <path d="M 1090 325 L 1090 380" class="msg"/>
  <text x="1035" y="315" text-anchor="middle" class="small">4. retrieve prerequisite results</text>

  <line x1="980" y1="365" x2="430" y2="365" class="msg"/>
  <text x="705" y="355" text-anchor="middle" class="small">5. execute analysis</text>

  <line x1="430" y1="405" x2="980" y2="405" class="ret"/>
  <text x="705" y="395" text-anchor="middle" class="small">6. produced result</text>

  <line x1="980" y1="445" x2="1090" y2="445" class="msg"/>
  <text x="1035" y="435" text-anchor="middle" class="small">7. register result</text>

</svg>
