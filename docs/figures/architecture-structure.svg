<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual Architecture Structure</title>
  <desc id="desc">Conceptual UML-style structural diagram showing the client, facade, plugin loader, metric executor, dependency sorter, metric plugin, result registry, and logger.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #475569; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="460" fill="#ffffff"/>
  <text x="600" y="38" text-anchor="middle" class="title">Conceptual Structure of the Metric Analysis Architecture</text>

  <rect x="50" y="190" width="140" height="64" class="box"/>
  <text x="120" y="228" text-anchor="middle" class="label">Client</text>

  <rect x="255" y="190" width="170" height="64" class="box"/>
  <text x="340" y="220" text-anchor="middle" class="label">Facade</text>
  <text x="340" y="240" text-anchor="middle" class="small">calculateMetrics</text>

  <rect x="500" y="80" width="190" height="70" class="box"/>
  <text x="595" y="118" text-anchor="middle" class="label">Plugin Loader</text>

  <rect x="500" y="285" width="190" height="70" class="box"/>
  <text x="595" y="323" text-anchor="middle" class="label">Metric Executor</text>

  <rect x="785" y="60" width="190" height="70" class="box"/>
  <text x="880" y="98" text-anchor="middle" class="label">Metric Plugin</text>

  <rect x="785" y="165" width="190" height="70" class="box"/>
  <text x="880" y="203" text-anchor="middle" class="label">Dependency Sorter</text>

  <rect x="785" y="270" width="190" height="70" class="box"/>
  <text x="880" y="308" text-anchor="middle" class="label">Result Registry</text>

  <rect x="785" y="375" width="190" height="70" class="box"/>
  <text x="880" y="413" text-anchor="middle" class="label">Logger</text>

  <line x1="190" y1="222" x2="255" y2="222" class="line"/>
  <line x1="425" y1="205" x2="500" y2="118" class="line"/>
  <line x1="425" y1="239" x2="500" y2="320" class="line"/>

  <line x1="690" y1="115" x2="785" y2="95" class="line"/>
  <line x1="690" y1="312" x2="785" y2="200" class="line"/>
  <line x1="690" y1="312" x2="785" y2="305" class="line"/>
  <line x1="690" y1="328" x2="785" y2="410" class="line"/>
  <line x1="690" y1="295" x2="785" y2="105" class="line"/>

  <path d="M 975 102 C 1030 102, 1030 305, 975 305" class="dash"/>

  <rect x="1005" y="80" width="155" height="132" class="note"/>
  <text x="1082.5" y="108" text-anchor="middle" class="label">Pattern Roles</text>
  <text x="1024" y="135" class="small">Facade</text>
  <text x="1024" y="156" class="small">Plugin architecture</text>
  <text x="1024" y="177" class="small">Topological ordering</text>
  <text x="1024" y="198" class="small">Result registry</text>

</svg>
